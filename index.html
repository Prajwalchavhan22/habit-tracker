<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Habit Tracker | Midnight Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --accent-green: #10b981; /* Emerald 500 */
            --glass-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            color: #f1f5f9; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        .serif { font-family: 'Playfair Display', serif; }

        /* Smooth Entry Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-fade-in { animation: fadeInUp 0.8s ease forwards; }
        
        /* Glassmorphism Dark */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Tactile Dark Cells */
        .habit-cell {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-color: rgba(255, 255, 255, 0.05) !important;
        }
        .habit-cell:hover {
            transform: scale(1.15);
            background-color: rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .cell-active { 
            background-color: var(--accent-green) !important; 
            color: #ffffff; 
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            border: none !important;
        }

        /* Staggered Row Animation */
        tbody tr { opacity: 0; animation: fadeInUp 0.5s ease forwards; }
        tbody tr:nth-child(1) { animation-delay: 0.1s; }
        tbody tr:nth-child(2) { animation-delay: 0.15s; }
        tbody tr:nth-child(3) { animation-delay: 0.2s; }
        tbody tr:nth-child(4) { animation-delay: 0.25s; }
        tbody tr:nth-child(5) { animation-delay: 0.3s; }
        tbody tr:nth-child(6) { animation-delay: 0.35s; }
        tbody tr:nth-child(7) { animation-delay: 0.4s; }
        tbody tr:nth-child(8) { animation-delay: 0.45s; }
        tbody tr:nth-child(9) { animation-delay: 0.5s; }
        tbody tr:nth-child(10) { animation-delay: 0.55s; }

        .graph-point { 
            background-color: #f1f5f9; 
            color: #020617; 
            border-radius: 50%; 
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        input { font-style: italic; transition: all 0.3s; color: #f1f5f9; }
        input::placeholder { color: #475569; }
        input:focus { border-color: var(--accent-green); }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @media print { 
            .no-print { display: none; } 
            body { background: white; color: black; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="splashScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#020617] transition-all duration-1000">
        <div class="max-w-2xl px-10 text-center animate-fade-in">
            <span class="text-slate-500 uppercase tracking-[0.4em] text-[10px] mb-8 block font-black">Daily Intention</span>
            <h2 id="randomQuote" class="serif text-3xl md:text-5xl italic text-slate-100 leading-tight mb-12"></h2>
            <button onclick="closeSplash()" class="group relative px-12 py-4 bg-emerald-500 text-slate-950 overflow-hidden transition-all duration-500 hover:pr-16 rounded-full font-bold">
                <span class="relative z-10 uppercase tracking-widest text-xs">Begin Practice</span>
                <span class="absolute right-4 top-1/2 -translate-y-1/2 opacity-0 transition-all duration-500 group-hover:opacity-100 group-hover:right-6">→</span>
            </button>
        </div>
    </div>

    <div id="mainContent" class="max-w-7xl mx-auto glass-card p-6 md:p-14 rounded-2xl opacity-0 transition-all duration-1000 transform translate-y-10">
        
        <header class="text-center mb-16">
            <h1 class="serif text-5xl md:text-7xl mb-10 tracking-tight text-white">Monthly Habit Tracker</h1>
            <div class="flex flex-col md:flex-row justify-center gap-8 md:gap-20">
                <div class="border-b-2 border-slate-700 focus-within:border-emerald-500 transition-all pb-2 text-left">
                    <label class="uppercase text-[9px] tracking-[0.3em] text-slate-500 font-black block mb-1">Practitioner</label>
                    <input type="text" id="userName" class="bg-transparent outline-none w-56 py-1 italic text-xl font-light tracking-wide" placeholder="Your Name">
                </div>
                <div class="border-b-2 border-slate-700 focus-within:border-emerald-500 transition-all pb-2 text-left">
                    <label class="uppercase text-[9px] tracking-[0.3em] text-slate-500 font-black block mb-1">Timeframe</label>
                    <input type="text" id="trackerMonth" class="bg-transparent outline-none w-56 py-1 italic text-xl font-light tracking-wide" placeholder="Current Month">
                </div>
            </div>
        </header>

        <div class="overflow-x-auto hide-scrollbar mb-20 rounded-xl shadow-2xl border border-slate-800">
            <table class="w-full border-collapse text-sm">
                <thead>
                    <tr class="bg-slate-900/50">
                        <th class="border-b border-r border-slate-800 p-6 text-left w-80 uppercase tracking-widest text-[10px] text-slate-400 font-bold">Protocols</th>
                        <script>
                            for(let i=1; i<=31; i++) {
                                document.write(`<th class="border-b border-slate-800 w-10 h-10 font-normal text-slate-500 text-[10px]">${i}</th>`);
                            }
                        </script>
                    </tr>
                </thead>
                <tbody id="habitBody"></tbody>
            </table>
        </div>

        <div class="mt-24">
            <div class="mb-10 text-center md:text-left">
                <h3 class="serif text-3xl italic text-slate-100">Consistency Graph</h3>
                <div class="h-1 w-20 bg-emerald-500/30 mt-4 mx-auto md:mx-0"></div>
            </div>
            
            <div class="overflow-x-auto hide-scrollbar bg-slate-950/40 rounded-2xl p-6 border border-slate-800">
                <table class="w-full border-collapse text-xs">
                    <tbody id="graphBody"></tbody>
                    <tfoot>
                        <tr>
                            <td class="p-4 font-black uppercase text-slate-600 text-center text-[9px] tracking-widest">Day</td>
                            <script>
                                for(let i=1; i<=31; i++) {
                                    document.write(`<td class="w-10 h-10 text-center text-slate-500 font-bold">${i}</td>`);
                                }
                            </script>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <footer class="mt-24 border-t border-slate-800 pt-12 flex flex-col md:flex-row justify-between items-center gap-10">
            <div class="text-center md:text-left group">
                <p id="footerQuote" class="serif italic text-2xl text-slate-400 transition-all group-hover:text-emerald-400">“Success is the product of daily habits.”</p>
                <p class="text-slate-600 text-[10px] mt-4 uppercase tracking-[0.4em] font-bold">— The Compound Effect</p>
            </div>
            <div class="flex gap-6 no-print">
                <button onclick="window.print()" class="px-8 py-3 bg-slate-800 text-slate-200 hover:bg-slate-100 hover:text-slate-900 transition-all text-[10px] uppercase tracking-[0.2em] font-black rounded-lg">Generate Report</button>
                <button onclick="resetTracker()" class="px-8 py-3 text-red-500/70 hover:text-red-500 transition-all text-[10px] uppercase tracking-[0.2em] font-black underline underline-offset-8">Reset Data</button>
            </div>
        </footer>
    </div>

    <script>
        const quotes = [
            "We are what we repeatedly do. Excellence is not an act, but a habit.",
            "The secret of your future is hidden in your daily routine.",
            "Small steps in the right direction lead to massive destinations.",
            "Your habits are the atoms of your life. Each is a unit of improvement.",
            "Discipline is choosing between what you want now and what you want most.",
            "Consistency is better than intensity.",
            "Focus on the trajectory, not the current result.",
            "You do not rise to the level of your goals, you fall to the level of your systems."
        ];

        const habitCount = 10;
        const daysInMonth = 31;
        let habitData = JSON.parse(localStorage.getItem('habitData')) || {};

        function showRandomQuote() {
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('randomQuote').innerText = `“${quote}”`;
            document.getElementById('footerQuote').innerText = `“${quote}”`;
        }

        function closeSplash() {
            document.getElementById('splashScreen').style.opacity = '0';
            document.getElementById('mainContent').style.opacity = '1';
            document.getElementById('mainContent').style.transform = 'translateY(0)';
            setTimeout(() => {
                document.getElementById('splashScreen').style.display = 'none';
            }, 1000);
        }

        const habitBody = document.getElementById('habitBody');
        for (let i = 0; i < habitCount; i++) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="border-b border-r border-slate-800 p-0 bg-slate-900/30">
                    <input type="text" class="w-full p-6 outline-none habit-name bg-transparent font-medium italic text-slate-200 placeholder:text-slate-700" 
                           placeholder="Type habit..." data-habit-index="${i}" 
                           value="${habitData[`name_${i}`] || ''}">
                </td>
                ${Array.from({length: 31}, (_, d) => `
                    <td class="border-b border-slate-800 text-center cursor-pointer habit-cell" 
                        data-day="${d+1}" data-habit="${i}" id="cell-${i}-${d+1}">
                        ${habitData[`${i}-${d+1}`] ? '✔' : ''}
                    </td>
                `).join('')}
            `;
            habitBody.appendChild(row);
        }

        function updateGraph() {
            const graphBody = document.getElementById('graphBody');
            graphBody.innerHTML = '';
            const dailyScores = {};
            for (let d = 1; d <= daysInMonth; d++) {
                let score = 0;
                for (let h = 0; h < habitCount; h++) {
                    if (habitData[`${h}-${d}`]) score++;
                }
                dailyScores[d] = score;
            }

            for (let s = 10; s >= 1; s--) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="w-16 text-center text-[10px] font-black text-slate-700 border-r border-slate-800">${s}</td>
                    ${Array.from({length: 31}, (_, d) => {
                        const day = d + 1;
                        const isActive = dailyScores[day] === s;
                        return `<td class="w-10 h-10 text-center ${isActive ? 'flex items-center justify-center' : ''}">
                                    ${isActive ? '<div class="graph-point w-6 h-6 flex items-center justify-center text-[8px] font-bold">●</div>' : ''}
                                </td>`;
                    }).join('')}
                `;
                graphBody.appendChild(row);
            }
        }

        habitBody.addEventListener('click', (e) => {
            if (e.target.classList.contains('habit-cell')) {
                const day = e.target.dataset.day;
                const habit = e.target.dataset.habit;
                const key = `${habit}-${day}`;
                if (habitData[key]) {
                    delete habitData[key];
                    e.target.innerText = '';
                    e.target.classList.remove('cell-active');
                } else {
                    habitData[key] = true;
                    e.target.innerText = '✔';
                    e.target.classList.add('cell-active');
                }
                saveData();
            }
        });

        habitBody.addEventListener('input', (e) => {
            if (e.target.classList.contains('habit-name')) {
                habitData[`name_${e.target.dataset.habitIndex}`] = e.target.value;
                saveData();
            }
        });

        function saveData() {
            localStorage.setItem('habitData', JSON.stringify(habitData));
            updateGraph();
        }

        function resetTracker() {
            if(confirm("Erase all data? This cannot be undone.")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = () => {
            showRandomQuote();
            document.querySelectorAll('.habit-cell').forEach(cell => {
                if(cell.innerText.trim() === '✔') cell.classList.add('cell-active');
            });
            ['userName', 'trackerMonth'].forEach(id => {
                const el = document.getElementById(id);
                el.value = localStorage.getItem(id) || '';
                el.addEventListener('input', () => localStorage.setItem(id, el.value));
            });
            updateGraph();
        };
    </script>
</body>
</html>
